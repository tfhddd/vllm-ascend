name: Test Artifact v0.2

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: linux-aarch64-a3-test-2
    steps:
      - uses: actions/checkout@v4

      - name: Create test files
        run: |
          mkdir -p testdata/subdir
          echo "singlecard timing - $(date)" > testdata/singlecard.json
          echo "2card timing - $(date)"      > testdata/twocard.json
          echo "should be excluded"          > testdata/excluded.log
          echo "subdir file"                 > testdata/subdir/nested.json

      - name: Upload single file
        id: upload-single
        uses: ascend-gha-runners/artifact/upload@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          name: timing-data-singlecard
          path: testdata/singlecard.json

      - name: Upload with multiline glob and exclusion
        id: upload-multi
        uses: ascend-gha-runners/artifact/upload@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          name: timing-data-all
          path: |
            testdata/
            !testdata/*.log

      - name: Print upload results
        run: |
          echo "Single artifact-id:  ${{ steps.upload-single.outputs.artifact-id }}"
          echo "Single artifact-url: ${{ steps.upload-single.outputs.artifact-url }}"
          echo "Multi  artifact-id:  ${{ steps.upload-multi.outputs.artifact-id }}"
          echo "Multi  artifact-url: ${{ steps.upload-multi.outputs.artifact-url }}"

  test-download:
    needs: test-upload
    runs-on: linux-aarch64-a3-test-2
    steps:
      - uses: actions/checkout@v4
