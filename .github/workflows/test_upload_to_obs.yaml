name: Test Artifact v0.2

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: linux-aarch64-a3-test-2
    steps:
      - uses: actions/checkout@v4

      - name: Create test files
        run: |
          echo "Hello from vllm-ascend CI - $(date)" > test-upload.txt
          echo "Second file - $(date)" > test-upload-2.txt

      - name: Upload single file
        id: upload
        uses: ascend-gha-runners/artifact/upload@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          name: test-artifact
          path: ./test-upload.txt

      - name: Upload directory
        uses: ascend-gha-runners/artifact/upload@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          name: test-artifact-dir
          path: ./*.txt

      - name: Print upload result
        run: |
          echo "Artifact ID: ${{ steps.upload.outputs.artifact-id }}"
          echo "Artifact URL: ${{ steps.upload.outputs.artifact-url }}"

  test-download:
    needs: test-upload
    runs-on: linux-aarch64-a3-test-2
    steps:
      - uses: actions/checkout@v4

      - name: Download by exact name
        id: dl-name
        uses: ascend-gha-runners/artifact/download@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          name: test-artifact
          path: ./downloaded/

      - name: Download by pattern
        id: dl-pattern
        uses: ascend-gha-runners/artifact/download@main
        with:
          access_key: ${{ secrets.HW_OBS_AK }}
          secret_key: ${{ secrets.HW_OBS_SK }}
          pattern: test-artifact*
          path: ./downloaded-pattern/

      - name: Verify downloads
        run: |
          echo "=== download by name ==="
          echo "Download path: ${{ steps.dl-name.outputs.download-path }}"
          find ./downloaded/ -type f
          cat ./downloaded/test-artifact/test-upload.txt

          echo "=== download by pattern ==="
          echo "Matched artifacts: ${{ steps.dl-pattern.outputs.matched-artifacts }}"
          find ./downloaded-pattern/ -type f
