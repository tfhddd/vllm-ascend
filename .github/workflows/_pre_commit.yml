name: pre-commit

on:
    workflow_call:
      inputs:
        vllm:
          required: true
          type: string

permissions:
  contents: read

jobs:
  validate-pr-title:
    runs-on: linux-amd64-cpu-test-8-hk
    container:
      # Build it from https://github.com/nv-action/vllm-benchmarks/blob/main/Dockerfile
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
    - name: Validate PR title prefix
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        # Fail if PR title is empty
        if [ -z "$PR_TITLE" ]; then
          echo "::error::PR title cannot be empty"
          exit 1
        fi

        echo "Checking PR title: $PR_TITLE"

        # Define valid prefixes (case-sensitive)
        # Check if PR title contains any valid prefix (not necessarily at the start)
        VALID_PREFIXES='\[(BugFix|Performance|Test|CI|Feature|Doc|Misc|Community|Refactor)\]'

        # Check if PR title contains a valid prefix
        if ! echo "$PR_TITLE" | grep -qE "$VALID_PREFIXES"; then
          echo "::error::PR title must contain one of the following prefixes: [BugFix], [Performance], [Test], [CI], [Feature], [Doc], [Misc], [Community], [Refactor]"
          echo "::error::Example: '[Feature] Add new optimization pass' or 'Add new feature [Feature]'"
          exit 1
        fi

        echo "✓ PR title prefix is valid"

  pre-commit:
    needs: [validate-pr-title]
    runs-on: linux-amd64-cpu-test-8-hk
    container:
      # Build it from https://github.com/nv-action/vllm-benchmarks/blob/main/Dockerfile
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
    - name: Checkout vllm-project/vllm-ascend repo
      uses: actions/checkout@v6

